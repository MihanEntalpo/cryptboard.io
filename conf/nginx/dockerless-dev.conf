server
{
    server_name dev.cryptboard.io;

    listen *:80;

    # Let’s Encrypt без basic auth
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
        auth_basic off;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server
{
    server_name dev.cryptboard.io;

    listen *:443;
    ssl on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_certificate /etc/letsencrypt/live/cryptboard.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptboard.io/privkey.pem;

    gzip            on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types      *;

    root /home/cryptboard/dev.cryptboard.io/web-app/public/;
    index index.php index.htm index.html;

    access_log /var/log/nginx/cryptboard.io-access.log;
    error_log  /var/log/nginx/cryptboard.io-error.log;

    error_page 405 = $uri;
    client_max_body_size 100m;

    # Basic auth на весь сервер
    auth_basic "Restricted area";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Let’s Encrypt без basic auth
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
        auth_basic off;
        allow all;
        try_files $uri =404;
    }

    # API без basic auth: запросы сразу уходят во front controller,
    # чтобы не попасть в общий PHP location с inherited auth_basic.
    location ^~ /api/ {
        auth_basic off;
        fastcgi_pass unix:/run/php/php7.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_ignore_client_abort off;
        fastcgi_param APPLICATION_ENV devel;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri $uri/ /index.php?$args;
        fastcgi_pass unix:/run/php/php7.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_ignore_client_abort off;
        fastcgi_param APPLICATION_ENV devel;
    }

    location ~ /webhook/webhook.php {
        root /home/cryptboard;
        try_files $uri /webhook.php;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
}
